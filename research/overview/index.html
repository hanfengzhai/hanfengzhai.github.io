<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Overview | Hanfeng Zhai</title>
  <link rel="icon" href="/css/images/site/favicon.jpg">
  <link rel="stylesheet" href="/css/styles/site-fonts.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: var(--page-bg, #f5f0e4);
    }

    .overview-frame {
      border: 5px solid lightgray;
      border-radius: 7px;
      background: #fff;
      padding: 12px;
      max-width: min(960px, 100%);
      box-sizing: border-box;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .overview-frame img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <figure class="overview-frame">
    <img src="/assets/img/research/research.png" alt="Multiscale research overview schematic">
  </figure>
</body>
</html>
